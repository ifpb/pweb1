<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<f:view>
    <h:form>
    <h:panelGrid columns="2">
        <h:outputText value="Nome: "/>
        <h:outputText value="#{usuarioBean.usuario.nome}" />
        <h:outputText value="E-mail: "/>
        <h:outputText value="#{usuarioBean.usuario.email}" />
        <h:outputText value="Idade: "/>
        <h:outputText value="#{usuarioBean.usuario.idade}" />
        <h:commandButton value="Confirmar remoção" action="#{usuarioBean.removeUser}" />
        <h:commandButton value="Cancelar" action="#{usuarioBean.list}" />
    </h:panelGrid>
    </h:form>
</f:view>
</html>
