<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<f:view>
    <h:outputLabel value="Olá, bem-vindo à minha primeira aplicação com JSF"/>

    <h:panelGroup rendered="#{usuarioBean.currentState == 'LIST'}">
        <ui:include src="usuario-list.xhtml" />
    </h:panelGroup>

    <h:panelGroup rendered="#{usuarioBean.currentState == 'CREATE' or usuarioBean.currentState == 'UPDATE'}">
        <ui:include src="usuario-form.xhtml" />
    </h:panelGroup>

    <h:panelGroup rendered="#{usuarioBean.currentState == 'REMOVE'}">
        <ui:include src="usuario-remove.xhtml" />
    </h:panelGroup>

</f:view>
</html>
