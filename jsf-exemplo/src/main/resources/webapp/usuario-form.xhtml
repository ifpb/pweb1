<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<f:view>
<!-- Formulario -->
<h:outputText value="Formulário aqui" />
<h:form>
    <h:commandButton value="Voltar para listagem" action="#{usuarioBean.gotoList}" />
    <h:panelGrid columns="3">
        <h:outputLabel id="nome" value="Nome: " />
        <h:inputText required="true" requiredMessage="Nome é obrigatório" value="#{usuarioBean.usuario.nome}" />
        <h:message for="nome" />
        <h:outputLabel id="email" value="E-mail: " />
        <h:inputText disabled="#{usuarioBean.currentState == 'UPDATE'}" required="true" requiredMessage="E-mail é obrigatório" value="#{usuarioBean.usuario.email}" />
        <h:message for="email" />
        <h:outputLabel id="idade" value="Idade: " />
        <h:inputText required="true" requiredMessage="Idade é obrigatória" value="#{usuarioBean.usuario.idade}" />
        <h:message for="idade" />
        <h:commandButton rendered="#{usuarioBean.currentState == 'CREATE'}" value="Criar" action="#{usuarioBean.createUser}" />
        <h:commandButton rendered="#{usuarioBean.currentState == 'UPDATE'}" value="Atualizar" action="#{usuarioBean.updateUser}" />
    </h:panelGrid>
</h:form>
</f:view>
</html>
